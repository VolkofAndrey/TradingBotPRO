# config/base.yaml
# Базовый конфиг — содержит все параметры с дефолтными значениями.
# Конфиги backtest/paper/live переопределяют только нужные ключи.

# ─── Инструмент ───────────────────────────────────────────────────────────────
figi: "FUTSI0325000"         # Фьючерс Si — замени на нужный FIGI
ticker: "Si-3.25"

# ─── Размер тика ─────────────────────────────────────────────────────────────
tick_size: 1.0               # шаг цены (в рублях/пунктах)
tick_value: 10.0             # стоимость 1 тика (руб./контракт)
go_per_contract: 5000.0      # гарантийное обеспечение (руб./контракт)

# ─── Риск-менеджмент ─────────────────────────────────────────────────────────
risk_per_trade: 0.01         # 1% от баланса на сделку
max_margin_usage: 0.5        # не более 50% баланса в марже
max_contracts: 10            # абсолютный потолок контрактов

# ─── ATR ─────────────────────────────────────────────────────────────────────
atr_period: 20
atr_fast_period: 10

# ─── Фильтр объёма ───────────────────────────────────────────────────────────
volume_ma_period: 20
volume_multiplier: 1.3       # текущий объём >= 1.3 × MA(20)

# ─── Фильтр перегрева ────────────────────────────────────────────────────────
overextend_atr_mult: 2.5     # расстояние от цены до MA(10) <= 2.5 × ATR

# ─── ADX / тренд ─────────────────────────────────────────────────────────────
adx_period: 14
adx_trend_min: 35.0          # сильный тренд
adx_weak_min: 20.0           # слабый тренд (ниже — флэт/ренж)
with_trend_only: true        # только с трендом

# ─── Уровни ликвидности ───────────────────────────────────────────────────────
level_lookback_bars: 390     # ~6.5 часов M1-баров
level_proximity_ticks: 2     # свеча должна пробить уровень хотя бы на 2 тика
level_min_touches: 2         # минимум касаний для Equal High/Low

# ─── Sweep ────────────────────────────────────────────────────────────────────
sweep_body_atr_min: 0.0      # 0 = не проверяем тело (включаем через > 0)
sweep_prev_candles: 5        # сколько свечей смотрим "до пробоя"

# ─── Return ───────────────────────────────────────────────────────────────────
return_min_ticks: 2          # минимальный возврат за уровень
return_max_candles: 5        # ждём возврат не более 5 свечей

# ─── Параметры сделки ─────────────────────────────────────────────────────────
stop_buffer_ticks: 5         # буфер за экстремум sweep
stop_max_atr_mult: 2.5       # стоп не больше 2.5 × ATR
take1_r_mult: 1.0            # take1 = 1R
take2_atr_mult: 1.5          # take2 = 1.5 × ATR (для fixed-режима)
min_rr: 1.5                  # минимальный R:R для входа

# ─── Take2-режим ─────────────────────────────────────────────────────────────
take2_mode: "psar"           # "fixed" | "trail" | "psar"

# ─── PSAR ────────────────────────────────────────────────────────────────────
psar_af_start: 0.02
psar_af_step: 0.02
psar_af_max: 0.20
psar_activation_r: 2.5      # активируем PSAR после 2.5R

# ─── Торговые сессии (время МСК) ──────────────────────────────────────────────
session_a_start: "09:00"
session_a_end:   "18:30"
session_b_start: "18:30"    # слабая сессия (только сильные сделки)
session_b_end:   "21:00"
hard_close_time: "21:00"    # принудительное закрытие всех позиций
strong_trade_close_time: "21:00"
strong_trade_session_end: true

# ─── Таймаут позиции ─────────────────────────────────────────────────────────
position_timeout_min: 45

# ─── Дневные лимиты ──────────────────────────────────────────────────────────
daily_drawdown_limit: 0.02   # 2% от баланса
max_consecutive_losses: 2

# ─── Логирование ─────────────────────────────────────────────────────────────
log_level: "INFO"
log_file: "logs/bot.log"
